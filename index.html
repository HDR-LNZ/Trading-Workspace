<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e1a" />
<title>Money Flow Workspace</title>

<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@11.1.2/dist/gridstack.min.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-dot"></span>
    <span class="brand-name" id="workspace-name">Money Flow Workspace</span>
    <span class="brand-status" id="market-status">Loading market status…</span>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost" id="reset-workspace" title="Reset to default layout">Reset Workspace</button>
    <button class="btn btn-primary" id="add-widget">+ Add widget</button>
  </div>
</header>

<main>
  <div class="grid-stack" id="grid"></div>
</main>

<!-- Chat overlay (hidden by default) -->
<aside class="chat-overlay" id="chat-overlay" hidden>
  <header class="chat-header">
    <div>
      <div class="chat-title" id="chat-title">Sector Chat</div>
      <div class="chat-sub" id="chat-sub">Ask about these tickers</div>
    </div>
    <button class="btn-icon" id="chat-close" title="Close">✕</button>
  </header>
  <div class="chat-messages" id="chat-messages"></div>
  <form class="chat-input" id="chat-form">
    <input type="text" id="chat-input" placeholder="Ask about this sector…" autocomplete="off" />
    <button type="submit" class="btn btn-primary">Send</button>
  </form>
</aside>

<!-- Add widget modal -->
<div class="modal" id="add-widget-modal" hidden>
  <div class="modal-card">
    <header class="modal-header">
      <h3>Add widget</h3>
      <button class="btn-icon" id="modal-close">✕</button>
    </header>
    <div class="modal-body">
      <button class="add-card" data-type="summary">
        <div class="add-card-title">Money Flow Summary</div>
        <div class="add-card-desc">AI executive summary of capital rotation across sectors</div>
      </button>
      <button class="add-card" data-type="watchlist">
        <div class="add-card-title">Sector watchlist</div>
        <div class="add-card-desc">Live quotes for a curated sector</div>
      </button>
      <button class="add-card" data-type="chart">
        <div class="add-card-title">Chart</div>
        <div class="add-card-desc">Candlestick chart for any ticker</div>
      </button>
      <button class="add-card" data-type="news">
        <div class="add-card-title">News</div>
        <div class="add-card-desc">Headlines + sentiment for a ticker</div>
      </button>
    </div>
    <div class="modal-body" id="modal-options" hidden>
      <!-- populated dynamically based on widget type -->
    </div>
  </div>
</div>

<!-- libs -->
<script src="https://cdn.jsdelivr.net/npm/gridstack@11.1.2/dist/gridstack-all.js"></script>
<script src="https://unpkg.com/lightweight-charts@5.0.5/dist/lightweight-charts.standalone.production.js"></script>

<!-- app -->
<script type="module" src="js/app.js"></script>

</body>
</html>
