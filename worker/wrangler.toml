name = "trading-workspace-api"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Set with: wrangler secret put FINNHUB_KEY
# Set with: wrangler secret put ANTHROPIC_KEY

[vars]
# Comma-separated origins allowed to hit this worker.
# Add your GitHub Pages URL once deployed, e.g.:
# ALLOWED_ORIGINS = "https://hdr-lnz.github.io,http://localhost:8000"
ALLOWED_ORIGINS = "https://hdr-lnz.github.io,http://localhost:8000,http://127.0.0.1:8000,http://localhost:8766,http://127.0.0.1:8766"
